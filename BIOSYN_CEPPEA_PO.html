<style>
  :root{--brand:#173a7a;--brand2:#1e4fa0;--brand3:#2f6fc0;--brandl:#5b9bd5;

    --green:#16a34a;--yellow:#f59e0b;--red:#dc2626;--purple:#7c3aed;
    --sh:0 1px 3px rgba(15,40,80,.06);--shl:0 12px 36px rgba(15,40,80,.14)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter','Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
  .app{display:flex;min-height:100vh}
  /* sidebar */
  .sb{position:fixed;top:0;left:0;height:100%;width:260px;background:linear-gradient(180deg,#0b1f42,#162f64);display:flex;flex-direction:column;z-index:50}
  .sb-logo{padding:20px 16px 18px;border-bottom:1px solid rgba(255,255,255,.07)}
  .logo-box{background:#fff;border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.18)}
  .sb-sub{margin-top:14px;display:flex;align-items:center;gap:8px}
  .sb-bar{width:4px;height:28px;border-radius:4px;background:#5b9bd5;flex-shrink:0}
  .sb-nav{flex:1;overflow-y:auto;padding:16px 12px}
  .sb-grp{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#3a6090;padding:0 8px;margin:14px 0 6px}
  .sb-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;margin-bottom:2px;background:none;color:#7a9dbf;font-size:13px;border:none;border-left:3px solid transparent;cursor:pointer;text-align:left;font-family:inherit;transition:.15s}
  .sb-btn:hover{color:#c2d8ee}
  .sb-btn.on{background:rgba(91,155,213,.18);color:#fff;font-weight:600;border-left-color:#5b9bd5}
  .sb-ft{padding:12px 20px;border-top:1px solid rgba(255,255,255,.07);font-size:10px;color:#2a4a6a}
  /* header */
  .hd{position:fixed;top:0;right:0;left:260px;height:64px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-bottom:1px solid #e8eef6;display:flex;align-items:center;justify-content:space-between;padding:0 20px 0 24px;z-index:30}
  .hd-t{font-size:16px;font-weight:800;color:var(--brand);letter-spacing:-.02em}
  .hd-s{font-size:11px;color:var(--tx3);margin-top:1px}
  .hd-pdf{padding:7px 14px;border-radius:10px;background:var(--brand);color:#fff;border:none;font-size:12px;font-weight:600;cursor:pointer}
  /* main */
  .main{margin-left:260px;flex:1;padding:84px 24px 24px}
  .sec{display:none}.sec.on{display:block}
  .stitle{font-size:20px;font-weight:800;color:var(--brand);letter-spacing:-.025em}
  .ssub{font-size:12px;color:var(--tx3);margin-top:3px;margin-bottom:16px}
  .grid{display:grid;gap:16px}
  .card{background:var(--card);border-radius:16px;box-shadow:var(--sh);border:1px solid rgba(226,232,240,.8);padding:20px;transition:.18s}
  .card.clk{cursor:pointer}
  .card.clk:hover{transform:translateY(-3px);box-shadow:var(--shl)}
  .lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3)}
  .kpi{font-size:30px;font-weight:800;letter-spacing:-.03em;color:var(--brand);line-height:1.1}
  .kpi2{font-size:21px;font-weight:800;letter-spacing:-.02em}
  .ic{display:flex;align-items:center;justify-content:center;border-radius:12px;flex-shrink:0;font-size:20px}
  .ic-md{width:46px;height:46px}.ic-sm{width:36px;height:36px;font-size:16px}.ic-lg{width:54px;height:54px;font-size:24px}
  .ctitle{font-size:13px;font-weight:700;color:#334155;margin-bottom:14px}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
  .bg-green{background:#dcfce7;color:#15803d}.bg-yellow{background:#fef9c3;color:#a16207}.bg-red{background:#fee2e2;color:#b91c1c}
  .bg-blue{background:#dbeafe;color:#1e40af}.bg-purple{background:#ede9fe;color:#6d28d9}.bg-gray{background:#f1f5f9;color:#475569}
  .ai{color:#a16207;background:#fef9c3;padding:1px 7px;border-radius:6px;font-size:11px}
  table{width:100%;border-collapse:collapse}
  th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);background:#f8fafc;border-bottom:1px solid var(--bd)}
  td{padding:11px 14px;font-size:13px;color:#334155;border-bottom:1px solid #f1f5f9}
  tr:hover td{background:#f8fafc}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
  .ov.on{display:flex}
  .mb{background:#fff;border-radius:20px;padding:28px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shl);position:relative}
  .mx{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:50%;border:none;background:#f1f5f9;color:#64748b;font-weight:700;cursor:pointer;font-size:14px}
  .row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
  .row span:first-child{color:var(--tx2)}.row span:last-child{font-weight:700}
  .av{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;flex-shrink:0}
  /* flow anim */
  @keyframes dash{to{stroke-dashoffset:-24}}
  .fa{stroke-dasharray:7 4;animation:dash 1.1s linear infinite}
  .clean-filter button{padding:6px 13px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;border:1px solid var(--bd);color:var(--tx2);margin:0 6px 6px 0}
  .clean-filter button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .ft{margin-top:32px;padding-top:16px;border-top:1px solid var(--bd);font-size:11px;color:var(--tx3)}
  @media print{.sb,.hd,.no-print{display:none!important}.main{margin-left:0;padding-top:0}.sec{display:block!important;page-break-after:always}body{background:#fff}.card{box-shadow:none;border:1px solid var(--bd)}}
  @media(max-width:980px){.sb{transform:translateX(-260px)}.hd{left:0}.main{margin-left:0}}
</style>
</head>

function logoSVG(){

 cols.forEach((c,i)=>{const s=i*360/n+gap/2,e=(i+1)*360/n-gap/2;

  p+=`<path d="M${x1} ${y1} A${R} ${R} 0 0 1 ${x2} ${y2} L${x3} ${y3} A${r} ${r} 0 0 0 ${x4} ${y4} Z" fill="${c}"/>`;});
 return `<svg width="196" height="57" viewBox="0 0 220 64">${p}

}

/* ════ CHARTS (SVG offline) ════ */
function barChart(data,h=200){const max=Math.max(...data.map(d=>d.v))*1.1,w=100/data.length;
 return `<svg viewBox="0 0 100 ${h/3}" style="width:100%;height:${h}px" preserveAspectRatio="none">${data.map((d,i)=>{const bh=(d.v/max)*(h/3-12),x=i*w+w*0.2,bw=w*0.6;return `<rect x="${x}" y="${h/3-bh-8}" width="${bw}" height="${bh}" rx="1.2" fill="${d.c}"/>`;}).join('')}</svg>
 <div style="display:flex;justify-content:space-around;margin-top:4px">${data.map(d=>`<div style="font-size:10px;color:#64748b;text-align:center;flex:1">${d.n}<br><b style="color:${d.c}">${d.v.toLocaleString('pt-BR')}</b></div>`).join('')}</div>`;}
function donut(data){const tot=data.reduce((s,d)=>s+d.v,0);let a=0,seg='';
 data.forEach(d=>{const ang=d.v/tot*360,x1=50+38*Math.cos((a-90)*Math.PI/180),y1=50+38*Math.sin((a-90)*Math.PI/180);a+=ang;const x2=50+38*Math.cos((a-90)*Math.PI/180),y2=50+38*Math.sin((a-90)*Math.PI/180);const lg=ang>180?1:0;seg+=`<path d="M${x1} ${y1} A38 38 0 ${lg} 1 ${x2} ${y2}" fill="none" stroke="${d.c}" stroke-width="16"/>`;});
 return `<svg viewBox="0 0 100 100" style="width:140px;height:140px">${seg}</svg><div style="flex:1">${data.map(d=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px;margin:6px 0"><span style="width:10px;height:10px;border-radius:3px;background:${d.c}"></span>${d.n} <b style="margin-left:auto">${brl(d.v)}</b></div>`).join('')}</div>`;}

 <div class="card" style="margin-top:16px"><div class="ctitle">📋 Produtos do Setor</div><table><thead><tr><th>Cód</th><th>Descrição</th><th>Peso</th><th>Vendido (Jun–Dez)</th><th>Estimado +30%</th></tr></thead><tbody>${PRODUTOS.map(p=>`<tr><td style="font-weight:700;color:#173a7a">${p.c}</td><td>${p.n}</td><td>${p.p}</td><td>${p.v.toLocaleString('pt-BR')} cx</td><td style="color:#16a34a;font-weight:700">${p.e.toLocaleString('pt-BR')} cx</td></tr>`).join('')}</tbody></table><div style="font-size:11px;color:#94a3b8;margin-top:8px">Insumos: Calcário · Cloreto de sódio · Caulim · Creme de milho</div></div>`;}

function secCU(){return `<div class="stitle">Custos do Setor Pó</div><div class="ssub">Consolidado mensal</div>
 <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr))">${[['RH Total/mês',brl(RH_BASE),'#173a7a'],['USE/mês',brl(USE_MES),'#2f6fc0'],['Manutenção/mês',brl(MANUT),'#5b9bd5'],['TOTAL/mês',brl(TOTAL),'#173a7a'],['Custo/caixa',brl(TOTAL/CXMES),'#16a34a'],['Custo/lote',brl(TOTAL/LOTES),'#16a34a']].map(k=>`<div class="card"><div class="lbl">${k[0]}</div><div class="kpi2" style="color:${k[2]};margin-top:4px">${k[1]}</div></div>`).join('')}</div>
 <div class="card" style="margin-top:16px"><div class="ctitle">Detalhamento RH</div><table><thead><tr><th>Colaborador</th><th>Cargo</th><th>Líquido</th><th>Custo Total</th><th>Hora-Homem</th><th>Bônus</th></tr></thead><tbody>${EQUIPE.map(c=>`<tr><td style="font-weight:700;color:${c.cor}">${c.nome.split(' ').slice(0,2).join(' ')}</td><td style="font-size:11px;color:#64748b">${c.cargo}</td><td>${c.liquido?brl(c.liquido):'<span class="ai">não alocado</span>'}</td><td style="font-weight:700">${c.custoTotal?brl(c.custoTotal):'<span class="ai">não alocado</span>'}</td><td>${c.horaHomem?'R$ '+c.horaHomem.toFixed(2).replace('.',','):'—'}</td><td>${c.bonus?brl(c.bonus):'—'}</td></tr>`).join('')}<tr style="background:#f8fafc;font-weight:700"><td colspan="3">TOTAL RH BASE</td><td colspan="3" style="color:#173a7a">${brl(RH_BASE)} | c/ bônus ${brl(RH_BONUS)}</td></tr></tbody></table></div>
 <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr));margin-top:16px"><div class="card"><div class="ctitle">Composição</div><div style="display:flex;align-items:center;gap:16px">${donut([{n:'RH',v:RH_BASE,c:'#173a7a'},{n:'USE',v:USE_MES,c:'#2f6fc0'},{n:'Manutenção',v:MANUT,c:'#5b9bd5'}])}</div></div></div>
 <div style="margin-top:14px;padding:12px;border-radius:12px;background:#fef9c3;color:#b45309;font-size:12px">⚠ Energia, hora-máquina e depreciação ainda não mensurados.</div>`;}

function secEP(){return `<div class="stitle">Equipamentos</div><div class="ssub">17 ativos · clique para a ficha técnica</div>
 <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(220px,1fr))">${EQUIP.map(e=>{const at=e.st==='a';return `<div class="card clk" style="border-top:3px solid ${at?'#f59e0b':'#22c55e'}" onclick="equip('${e.id}')"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><div class="ic ic-md" style="background:${at?'#fef9c3':'#dcfce7'}">⚙️</div><span class="badge ${at?'bg-yellow':'bg-green'}">${at?'⚠ Atenção':'✓ OK'}</span></div><div style="font-size:14px;font-weight:700">${e.nome}</div><div style="font-size:11px;color:#94a3b8;margin-bottom:8px">${e.id} · ${e.tipo}</div>${e.cap!=='—'?`<div class="row" style="border:none;padding:3px 0"><span style="font-size:12px;color:#64748b">Capacidade</span><span style="font-size:12px;font-weight:600">${e.cap}</span></div>`:''}${e.resp!=='—'?`<div class="row" style="border:none;padding:3px 0"><span style="font-size:12px;color:#64748b">Responsável</span><span style="font-size:12px;font-weight:600">${e.resp}</span></div>`:''}</div>`;}).join('')}</div>`;}

let liFilter='Todos';
function secLI(){const ps=['Todos','Diário','3x/semana','Semanal','Mensal','Eventual','Anual'];
 const rows=LIMPEZA.filter(r=>liFilter==='Todos'||r[1]===liFilter);
 return `<div class="stitle">Plano de Limpeza</div><div class="ssub">PLIM.01.00 · POP 02 · Elab. Michelly Quandt · Aprov. Alessandra Gruber</div>
 <div class="clean-filter">${ps.map(p=>`<button class="${liFilter===p?'on':''}" onclick="liFilter='${p}';render('li')">${p}</button>`).join('')}</div>
 <div class="card"><table><thead><tr><th>Item</th><th>Periodicidade</th><th>Responsável</th></tr></thead><tbody>${rows.map(r=>{const c=PCOR[r[1]];return `<tr><td style="font-weight:600">${r[0]}</td><td><span class="badge" style="background:${c[0]};color:${c[1]}">${r[1]}</span></td><td>${r[2]}</td></tr>`;}).join('')}</tbody></table></div>`;}

function secBI(){return `<div class="stitle">Biossegurança (USE) · NB-2</div><div class="ssub">Nível de Biossegurança 2</div>
 <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr))">${[['Mão de obra/mês','R$ 210,53','#2f6fc0'],['Materiais/mês','R$ 719,96','#5b9bd5'],['Total USE/mês','R$ 930,49','#173a7a'],['Custo/caixa','R$ 0,21','#16a34a']].map(k=>`<div class="card"><div class="lbl">${k[0]}</div><div class="kpi2" style="color:${k[2]};margin-top:4px">${k[1]}</div></div>`).join('')}</div>
 <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-top:16px">
  <div class="card"><div class="ctitle">Materiais de Biossegurança</div><table><thead><tr><th>Item</th><th>Qtd</th><th>Unit.</th><th>Total</th></tr></thead><tbody>${USEMAT.map(m=>`<tr><td>${m[0]}</td><td style="color:#64748b">${m[1]}</td><td style="color:#64748b">${brl(m[2])}</td><td style="font-weight:700;color:#173a7a">${brl(m[3])}</td></tr>`).join('')}<tr style="background:#f8fafc;font-weight:700"><td colspan="3">Total materiais</td><td style="color:#173a7a">R$ 719,96</td></tr></tbody></table></div>
  <div class="card"><div class="ctitle">Checklist Diário USE</div>${['Swab ATP','Liberação visual','Limpeza úmida (2×/sem)','Máscara + luvas + EPIs'].map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:9px;background:#dcfce7;margin-bottom:6px"><span style="color:#16a34a;font-weight:700">✓</span><span style="font-size:13px;color:#166534">${c}</span></div>`).join('')}<div style="font-size:11px;color:#94a3b8;margin-top:8px">EPIs não entram neste centro de custo.</div></div>
 </div>`;}

function secMN(){return `<div class="stitle">Manutenção</div><div class="ssub">Preventivas, paradas e impacto</div>
 <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(200px,1fr))">${[['Custo preventiva/mês','R$ 359,81','#173a7a'],['Perfil da equipe','Op. Pleno','#2f6fc0'],['Hora-homem','R$ 22,49/h','#2f6fc0'],['Parada/mês','8h (1 dia)','#dc2626'],['Cx não produzidas','~280 cx','#dc2626'],['Frequência','1×/mês','#16a34a']].map(k=>`<div class="card"><div class="lbl">${k[0]}</div><div class="kpi2" style="color:${k[2]};margin-top:4px">${k[1]}</div></div>`).join('')}</div>
 <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-top:16px">
  <div class="card"><div class="ctitle">Plano de Preventivas</div>${[['Misturadores 1, 2, 3','1×/mês — dia inteiro · 2 Op. Pleno','#16a34a'],['Calibração Balanças','Terceirizada','#5b9bd5'],['Peças / Histórico','a informar','#f59e0b']].map(p=>`<div style="display:flex;gap:10px;padding:12px;border-radius:12px;background:#f8fafc;border:1px solid #e2e8f0;margin-bottom:8px"><div style="width:10px;height:10px;border-radius:50%;background:${p[2]};margin-top:4px"></div><div><div style="font-size:13px;font-weight:600">${p[0]}</div><div style="font-size:11px;color:#64748b">${p[1]}</div></div></div>`).join('')}</div>
  <div class="card"><div class="ctitle">Paradas por equipamento (h/mês)</div>${barChart([{n:'M1',v:8,c:'#f59e0b'},{n:'M2',v:8,c:'#f59e0b'},{n:'M3',v:8,c:'#f59e0b'},{n:'MY',v:4,c:'#5b9bd5'}])}</div>
 </div>
 <div class="card" style="border-left:4px solid #f59e0b;margin-top:16px"><div style="font-weight:700;font-size:13px;color:#b45309">⚠ Impacto da Parada Preventiva</div><p style="font-size:13px;color:#64748b;margin-top:6px;line-height:1.7">Preventiva mensal dos misturadores ocupa 1 dia inteiro (8h), com o setor improdutivo — ~280 caixas não produzidas.</p></div>`;}

const FLUXO={'RECEBIMENTO':[['Insumo recebido','#dcfce7','#166534','Almoxarifado'],['Inspeção CQ','#ede9fe','#5b21b6','Laboratório CQ'],['Insumo liberado','#dcfce7','#166534','CQ']],
 'MISTURA E ENVASE':[['Planejamento (PCP)','#f1f5f9','#334155','PCP'],['Preparação (3 frentes)','#fef9c3','#854d0e','Operadores'],['Peneiramento','#1e293b','#fff','Mistura Fina'],['Mistura fina + grossa','#fcd34d','#78350f','Warlysson/Lucas/Juan'],['Rotulagem','#fce7f3','#9d174d','João'],['Envase e pesagem','#fcd34d','#78350f','Operadores'],['Análise de reténs','#ede9fe','#5b21b6','Gilson (CQ)']],
 'PRODUTO ACABADO':[['Inspeção PA','#ede9fe','#5b21b6','CQ'],['2ª conferência','#fce7f3','#9d174d','Embalagem'],['Selagem','#fce7f3','#9d174d','João'],['Inspeção selagem','#ede9fe','#5b21b6','CQ'],['Filme stretch','#fce7f3','#9d174d','Embalagem'],['Liberação PA','#ede9fe','#5b21b6','CQ'],['Estoque PA','#dcfce7','#166534','Almoxarifado']],
 'REPROCESSO':[['Identificação NC','#ede9fe','#5b21b6','CQ'],['Requisição (PCP)','#f1f5f9','#334155','PCP'],['Reprocesso','#fcd34d','#78350f','Área mistura'],['Selagem/Peneira','#fce7f3','#9d174d','Embalagem'],['Liberação (CQ)','#ede9fe','#5b21b6','CQ']]};
const FLCOR={'RECEBIMENTO':['#166534','#f0fdf4','#86efac'],'MISTURA E ENVASE':['#854d0e','#fffbeb','#fcd34d'],'PRODUTO ACABADO':['#9d174d','#fdf2f8','#f9a8d4'],'REPROCESSO':['#1e3a8a','#eff6ff','#93c5fd']};
function fluxBox(t,r){openM(`<div style="font-size:18px;font-weight:800;color:#173a7a;margin-bottom:6px">${t}</div><div class="row"><span>Responsável</span><span>${r}</span></div>`);}
function secFL(){return `<div class="stitle">Fluxograma</div><div class="ssub">Linha Pó acima de 2 kg · 4 raias · clique nas etapas</div>
 <div class="card" style="margin-bottom:16px"><div class="ctitle">Legenda — Tipo de atividade</div><div style="display:flex;flex-wrap:wrap;gap:8px">${[['#ede9fe','Controle de Qualidade'],['#dcfce7','Almoxarifado'],['#fcd34d','Mistura e envase'],['#fce7f3','Embalagem e selagem'],['#1e293b','Mistura Fina'],['#f1f5f9','PCP']].map(l=>`<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#64748b"><span style="width:14px;height:14px;border-radius:4px;background:${l[0]};border:1px solid #0001"></span>${l[1]}</div>`).join('')}</div></div>
 <div class="card" style="overflow-x:auto"><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;min-width:640px">${Object.keys(FLUXO).map(raia=>{const c=FLCOR[raia];return `<div><div style="padding:12px;text-align:center;font-size:10px;font-weight:800;color:${c[0]};background:${c[1]};border-bottom:2px solid ${c[2]};border-radius:8px 8px 0 0;text-transform:uppercase;letter-spacing:.05em">${raia}</div><div style="padding:10px 6px">${FLUXO[raia].map((e,i)=>`<div onclick="fluxBox('${e[0]}','${e[3]}')" style="padding:10px;border-radius:9px;background:${e[1]};color:${e[2]};font-size:12px;font-weight:600;cursor:pointer;border:1px solid #0002;margin-bottom:${i<FLUXO[raia].length-1?'6px':'0'}">${e[0]}</div>${i<FLUXO[raia].length-1?'<div style="text-align:center;color:#94a3b8;font-size:12px;line-height:1">↓</div>':''}`).join('')}</div></div>`;}).join('')}</div></div>`;}

const SECF={vg:secVG,mp:secMP,eq:secEQ,cr:secCR,pr:secPR,cu:secCU,ep:secEP,li:secLI,bi:secBI,mn:secMN,fl:secFL};
let cur='vg';
function render(s){cur=s;$('main').innerHTML=`<div class="sec on">${SECF[s]()}</div><footer class="ft">Elaborado por: Gilson Pruença — Técnico do Setor Pó · Aprovado por: Matheus Peixoto — Líder de Biossegurança · Ref.: Maio 2026</footer>`;
 $('hd-t').textContent=TITLES[s][0];$('hd-s').textContent='BioSyn · Setor Pó · '+TITLES[s][1];
 document.querySelectorAll('.sb-btn').forEach(b=>b.classList.toggle('on',b.dataset.s===s));window.scrollTo(0,0);}

/* init */
$('logo').innerHTML=logoSVG();
$('nav').innerHTML=NAV.map(g=>`<div class="sb-grp">${g[0]}</div>`+g[1].map(i=>`<button class="sb-btn" data-s="${i[0]}" onclick="render('${i[0]}')"><span style="width:16px;text-align:center">${i[2]}</span>${i[1]}</button>`).join('')).join('');
render('vg');
</script>
</body>
